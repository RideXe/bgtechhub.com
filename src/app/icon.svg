<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background circle -->
  <rect width="32" height="32" rx="8" fill="#050a06"/>

  <!-- Hexagon shape -->
  <polygon
    points="16,3 27,9 27,23 16,29 5,23 5,9"
    fill="none"
    stroke="#1a6b2e"
    stroke-width="1.5"
  />

  <!-- Inner glow ring -->
  <polygon
    points="16,6 24.5,11 24.5,21 16,26 7.5,21 7.5,11"
    fill="rgba(61,189,92,0.06)"
    stroke="#3dbd5c"
    stroke-width="0.75"
    stroke-opacity="0.5"
  />

  <!-- "B" letter -->
  <text
    x="9"
    y="21.5"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="13"
    fill="#3dbd5c"
    letter-spacing="-0.5"
  >BG</text>
</svg>
